		<header>
			<h1>FOTOS DEL PROYECTO CNDH</h1>

	<style> 
				.botones {
      display: flex;
      
      gap: 15px;
    }

    .btn {
      display: block;
      padding: 10px 30px;
      background: #b88d50;
      color: rgb(16, 16, 16);
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: all 0.3s ease;
	}
	   .boton-regreso {
            position: fixed;
            bottom: 20px; /* Distancia desde la esquina inferior */
            right: 20px;  /* Distancia desde la esquina derecha */
            z-index: 9999; /* Asegura que esté por encima de otros elementos */
            background-color: #eceff1; /* Color del botón */
            color:black (13, 13, 13, 0.448); /* Color del texto */
            border: none;
            border-radius: 50px; /* Forma redondeada */
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(24, 45, 68, 0.516); /* Sombreado */
            transition: background-color 0.3s ease;
    }
	.btn:hover {
      background: #382e19;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
	}
	 .boton-regreso1 {
            position: fixed;
            bottom: 90px; /* Distancia desde la esquina inferior */
            right: 20px;  /* Distancia desde la esquina derecha */

            transition: background-color 0.3s ease;
    }
        .boton-regreso:hover {
            background-color: #15058d; /* Color al pasar el ratón */
        }
		 </style>
				

                    </div>
				</div>
